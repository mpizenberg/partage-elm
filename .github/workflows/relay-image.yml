name: Build Relay Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Cache ~/.elm
        uses: actions/cache@v5
        with:
          path: ~/.elm
          key: elm-${{ hashFiles('elm.json', 'elm-tooling.json', 'review/elm.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NO_ELM_TOOLING_INSTALL: 1

      - name: Install Elm tools
        run: pnpm elm-tooling install

      - name: Build frontend for same-origin serving
        run: pnpm build:optimize
        env:
          SERVER_URL: ""

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/relay/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/relay:latest
            ghcr.io/${{ github.repository }}/relay:${{ github.sha }}
